name: Desafio de Variaveis e Escopos

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: MeuApp

jobs:
  exemplo:
    runs-on: ubuntu-latest
    env:
      BUILD_VERSION: "1.0.0"

    steps:
      - name: Passo 1 - Variáveis em Escopos Diferentes
        run: |
          echo "APP_NAME: $APP_NAME"
          echo "BUILD_VERSION: $BUILD_VERSION"
          STEP_TEMP="Sou uma variável de step"
          echo "STEP_TEMP criada"

      - name: Passo 2 - Tentando acessar STEP_TEMP
        run: |
          echo "APP_NAME: $APP_NAME"
          echo "BUILD_VERSION: $BUILD_VERSION"
          echo "STEP_TEMP: $STEP_TEMP"
